<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - SosVel</title>
    <link rel="stylesheet" href="../stylist/style.css">
</head>
<body class="auth-page">

    <div class="auth-container">
        <div class="auth-card">
            <h1>SosVel</h1>
            <p class="auth-subtitle">Đăng nhập để tiếp tục</p>

            <form id="loginForm" class="auth-form">
                <label for="loginEmail">Email</label>
                <input type="email" id="loginEmail" placeholder="Nhập email" required>

                <label for="loginPassword">Mật khẩu</label>
                <input type="password" id="loginPassword" placeholder="Nhập mật khẩu" required>

                <button type="submit" class="auth-btn">Đăng nhập</button>
            </form>

            <p id="loginMessage" class="auth-message"></p>

            <p class="auth-switch">
                Chưa có tài khoản?
                <a href="register.html">Đăng ký ngay</a>
            </p>

            <p class="auth-switch">
                <a href="index.html">← Quay lại trang chủ</a>
            </p>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
