<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SosVel</title>
    <link rel="stylesheet" href="../stylist/style.css">
</head>
<body>

    <header>
        <h1>SosVel</h1>
        <p>Nền tảng tìm trọ dành cho sinh viên</p>
    </header>

    <nav>
        <a href="#">Trang chủ</a>
        <a href="#">Tìm phòng</a>
        <a href="#">Đăng phòng</a>
        <a href="#">Liên hệ</a>
    </nav>

    <div class="container">
        <div class="search-box">
            <h2>Tìm phòng trọ</h2>

            <div class="filter-bar">
                <div class="filter-item">
                    <label for="areaInput">Khu vực</label>
                    <select id="areaInput">
                        <option value="">Tất cả khu vực</option>
                        <option value="Đông Hòa">Đông Hòa</option>
                        <option value="Dĩ An">Dĩ An</option>
                        <option value="Thủ Đức">Thủ Đức</option>
                        <option value="Suối Tiên">Suối Tiên</option>
                        <option value="Linh Trung">Linh Trung</option>
                        <option value="Bình Thọ">Bình Thọ</option>
                    </select>
                </div>

                <div class="filter-item price-filter">
                    <label for="priceInput">
                        Giá tối đa:
                        <span id="priceValue">1,000,000</span> VNĐ
                    </label>

                    <input
                        type="range"
                        id="priceInput"
                        min="1000000"
                        max="5000000"
                        step="100000"
                        value="1000000"
                        oninput="updatePrice()"
                    >

                    <div class="price-note">
                        <span>1tr</span>
                        <span>5tr+</span>
                    </div>
                </div>

                <div class="filter-action">
                    <button onclick="searchRoom()">Tìm kiếm</button>
                </div>
            </div>
        </div>

        <div class="rooms" id="roomContainer"></div>
    </div>

    <footer>
        <p>© 2026 SosVel</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
