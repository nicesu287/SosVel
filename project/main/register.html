<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - SosVel</title>
    <link rel="stylesheet" href="../stylist/style.css">
</head>
<body class="auth-page">

    <div class="auth-container">
        <div class="auth-card">
            <h1>SosVel</h1>
            <p class="auth-subtitle">Tạo tài khoản mới</p>

            <form id="registerForm" class="auth-form">
                <label for="registerName">Họ và tên</label>
                <input type="text" id="registerName" placeholder="Nhập họ và tên" required>

                <label for="registerDob">Ngày tháng năm sinh</label>
                <input type="date" id="registerDob" required>

                <label for="registerCccd">CCCD</label>
                <input type="text" id="registerCccd" placeholder="Nhập CCCD" required>

                <label for="registerPhone">Số điện thoại</label>
                <input type="text" id="registerPhone" placeholder="Nhập số điện thoại" required>

                <label for="registerEmail">Email</label>
                <input type="email" id="registerEmail" placeholder="Nhập email" required>

                <label for="registerPassword">Mật khẩu</label>
                <input type="password" id="registerPassword" placeholder="Nhập mật khẩu" required>

                <label for="registerConfirmPassword">Xác nhận mật khẩu</label>
                <input type="password" id="registerConfirmPassword" placeholder="Nhập lại mật khẩu" required>

                <button type="submit" class="auth-btn">Đăng ký</button>
            </form>

            <p id="registerMessage" class="auth-message"></p>

            <p class="auth-switch">
                Đã có tài khoản?
                <a href="login.html">Đăng nhập</a>
            </p>

            <p class="auth-switch">
                <a href="index.html">← Quay lại trang chủ</a>
            </p>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
